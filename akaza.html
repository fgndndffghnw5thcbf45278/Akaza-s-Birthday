<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Akash</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #1a0000, #000000);
    font-family: 'Georgia', serif;
    overflow:hidden;
}

/* Vampire Fog Animation */

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: url("bg.jpg");
    background-size: cover;
    background-position: center;
    font-family: 'Georgia', serif;
    overflow:hidden;
}

@keyframes fog{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

/* Main Text */

h1{
    color:#ff1a1a;
    font-size:60px;
    text-align:center;
    text-shadow:
    0 0 10px #ff0000,
    0 0 20px #ff0000,
    0 0 40px #990000;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #990000;
    }
    to{
        text-shadow:
        0 0 20px #ff3333,
        0 0 40px #ff0000,
        0 0 60px #660000;
    }
}

</style>
</head>

<body>

<h1> happy Birthday My Best Friend <br> Akash H.R.<br> 🩸</h1>

</body>
</html>
